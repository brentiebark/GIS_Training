# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        # 1. Create the system-mandated cloud folder structure first
        - mkdir -p $READTHEDOCS_OUTPUT/html
        # 2. Compile directly into the cloud path, explicitly overriding local paths
        - sphinx-build -b html -d _build/doctrees . $READTHEDOCS_OUTPUT/html

python:
  install:
    - requirements: requirements.txt
