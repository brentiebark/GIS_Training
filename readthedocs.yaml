# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        # 1. Manually set up the virtual environment provided by Read the Docs
        - python -m virtualenv $READTHEDOCS_VIRTUALENV_PATH
        # 2. Upgrade pip and install all requirements
        - $READTHEDOCS_VIRTUALENV_PATH/bin/pip install --upgrade pip
        - $READTHEDOCS_VIRTUALENV_PATH/bin/pip install -r requirements.txt
        # 3. Create the mandatory cloud output directory
        - mkdir -p $READTHEDOCS_OUTPUT/html
        # 4. Build the HTML using the virtual environment's Sphinx installation
        - $READTHEDOCS_VIRTUALENV_PATH/bin/sphinx-build -b html -d _build/doctrees . $READTHEDOCS_OUTPUT/html

python:
  install:
    - requirements: requirements.txt
